<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <script src="https://kit.fontawesome.com/766cec8ad2.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="../styles/calculator.css">

</head>

<body>
    <!-- NAV AREA -->
    <nav>
        <div class="clock" id="hours">clock</div>

        <div class="phone-status">
            <div class="status">
                <span class="material-symbols-outlined icon-status">android_cell_4_bar</span>
            </div>

            <div class="status">
                <span class="material-symbols-outlined icon-status">wifi</span>
            </div>

            <div class="status">
                <span class="material-symbols-outlined icon-status">battery_android_6</span>
            </div>
        </div>
    </nav>
    <!-- END NAV AREA -->

    <!-- HEADER AREA -->
    <header>
            <div class="component">
                <span class="material-symbols-outlined icon">schedule</span>
            </div>

        <!-- Themes area -->

            <div class="component menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        <div class="themes">
                <!-- dark/light -->
                <div class="component" id="light-button">
                    <span class="material-symbols-outlined icon" id="sunny-icon">sunny<span>
                </div>

                <!-- colors-themes -->
                <div class="colors-themes-container">
                    <div class="colors-themes-items">
                        
                        <div class="color-theme" id="pink-theme"></div>
                        
                        <div class="color-theme" id="blue-theme"></div>
                        
                        <div class="color-theme" id="purple-theme"></div>

                        <div class="color-theme" id="default-theme"></div>
                    </div>
                </div>
            </div>
        <!-- end themes area -->

            <div class="component">
                <i class="fa-solid fa-calculator"></i>
            </div>
    </header>
    <!-- END HEADER AREA -->

    <!-- MAIN AREA -->
    <main>
        <section class="result">
            <p>0</p>
        </section>

        <!-- BUTTONS AREA -->
        <section class="buttons">

                <div class="buttons-utilities">
                    <span class="material-symbols-outlined">backspace</span>
                </div>
                <div class="buttons-utilities" id="AC">AC</div>

                <div class="buttons-utilities">%</div>
                <div class="buttons-operators">/</div>

                <div class="buttons-numbers">7</div>
                <div class="buttons-numbers">8</div>
                <div class="buttons-numbers">9</div>
                <div class="buttons-operators">x</div>

                <div class="buttons-numbers">4</div>
                <div class="buttons-numbers">5</div>
                <div class="buttons-numbers">6</div>
                <div class="buttons-operators">-</div>

                <div class="buttons-numbers">1</div>
                <div class="buttons-numbers">2</div>
                <div class="buttons-numbers">3</div>
                <div class="buttons-operators">+</div>

                <div class="buttons-numbers">+/-</div>
                <div class="buttons-numbers">0</div>
                <div class="buttons-numbers">,</div>
                <div class="buttons-operators">=</div>
        </section>
    </main>
    <!-- END MAIN AREA -->

    <script src="../js/calculator.js"></script>
</body>

</html>
