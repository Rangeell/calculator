<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StopWatch App</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <link rel="stylesheet" href="../styles/stopwatch.css">
</head>

<body>
    <!-- HEADER AREA -->
    <header>
        <!-- Status area -->
        <div class="clock" id="hours">clock</div>

        <div class="phone-status">
            <div class="status">
                <span class="material-symbols-outlined icon-status">android_cell_4_bar</span>
            </div>

            <div class="status">
                <span class="material-symbols-outlined icon-status">wifi</span>
            </div>

            <div class="status">
                <span class="material-symbols-outlined icon-status">battery_android_6</span>
            </div>
        </div>

    </header>
    <!-- END HEADER AREA -->

    <!-- MAIN AREA -->
    <main>

        <!-- Stopwatch area -->
        <section class="stopwatch">
            00:00,00
        </section>
        <section class="controls">
            <button class="lap-reset-button">Lap</button>
            <button class="start-button">Start</button>
        </section>
        <hr>
        <!-- end stopwatch area -->

        <!-- Laps area -->
        <section class="laps">
            <ul class="lap-number">
                <li>Lap 1</li>
            </ul>
            <ul class="time">
                <li>00:00,00</li>
            </ul>
        </section>
        <hr>
        <!-- End laps area -->
    </main>
    <!-- END MAIN AREA -->

    <!-- DOCK AREA -->
    <section class="dock">
        <div class="icon-container">
            <img src="../svg/stopwatch.svg" alt="Imagem de cronômetro laranja">
            <p>Stopwatch</p>
        </div>
    </section>
    <!-- END DOCK AREA -->

    <!-- home-indicator -->
    <a href="home.html" target="iphone-screen">
        <section class="home-indicator ">
        </section>
    </a>

    <script src="../js/stopwatch.js"></script>
</body>

</html>
