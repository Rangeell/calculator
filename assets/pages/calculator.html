<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <script src="https://kit.fontawesome.com/766cec8ad2.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="../styles/calculator.css">

</head>

<body>
    <!-- HEADER AREA -->
    <header>
        <div class="clock" id="hours">clock</div>

        <div class="phone-status">
            <div class="status">
                <span class="material-symbols-outlined icon-status">android_cell_4_bar</span>
            </div>

            <div class="status">
                <span class="material-symbols-outlined icon-status">wifi</span>
            </div>

            <div class="status">
                <span class="material-symbols-outlined icon-status">battery_android_6</span>
            </div>
        </div>
    </header>
    <!-- END HEADER AREA -->

    <!-- NAV AREA -->
    <nav>

        <!-- history button -->
        <button class="component" id="history-button">
            <span class="material-symbols-outlined icon">schedule</span>
        </button>

        <!-- THEMES AREA -->
        <button class="component menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="themes">
            <!-- dark/light theme -->
            <button class="component" id="light-button">
                <span class="material-symbols-outlined icon" id="sunny-icon">sunny</span>
            </button>

            <!-- colors-themes -->
            <div class="colors-themes-container">
                <div class="colors-themes-items">

                    <button class="color-theme" id="pink-theme"></button>

                    <button class="color-theme" id="blue-theme"></button>

                    <button class="color-theme" id="purple-theme"></button>

                    <button class="color-theme" id="default-theme"></button>

                </div>
            </div>
        </div>
        <!-- end themes area -->

        <!-- calculator type -->
        <div class="component">
            <i class="fa-solid fa-calculator"></i>
        </div>

    </nav>
    <!-- END NAV AREA -->

    <!-- MAIN AREA -->
    <main>
        <section class="result">
            0
        </section>

        <!-- BUTTONS AREA -->
        <section class="buttons">

            <button class="buttons-utilities" id="backspace">
                <span class="material-symbols-outlined">backspace</span>
            </button>
            <button class="buttons-utilities" id="ac">AC</button>

            <button class="buttons-utilities">%</button>
            <button class="buttons-operators">/</button>

            <button class="buttons-numbers">7</button>
            <button class="buttons-numbers">8</button>
            <button class="buttons-numbers">9</button>
            <button class="buttons-operators">x</button>

            <button class="buttons-numbers">4</button>
            <button class="buttons-numbers">5</button>
            <button class="buttons-numbers">6</button>
            <button class="buttons-operators">-</button>

            <button class="buttons-numbers">1</button>
            <button class="buttons-numbers">2</button>
            <button class="buttons-numbers">3</button>
            <button class="buttons-operators">+</button>

            <button class="buttons-numbers">+/-</button>
            <button class="buttons-numbers">0</button>
            <button class="buttons-numbers">,</button>
            <button class="buttons-operators" id="equal">=</button>

            <!-- history card -->
            <section class="history">
            </section>
        </section>

        <!-- home-indicator -->
        <a href="home.html" target="iphone-screen">
            <section class="home-indicator ">
            </section>
        </a>

    </main>
    <!-- END MAIN AREA -->

    <script src="../js/calculator.js"></script>
</body>

</html>
